<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رسانه هنری قمر | پنل سازنده</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #fdfbf7; --milk: #f5efe6; --beige: #ede4d8;
      --gold: #c8af93; --brown: #8b6f4e; --dark: #3e2c1c;
      --text: #5c4a3a; --white: #ffffff; --red: #c0392b;
      --green: #27ae60; --blue: #2980b9; --shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--cream) 0%, var(--milk) 50%, var(--beige) 100%);
      min-height: 100vh; color: var(--text);
    }
    .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .login-container { width: 100%; max-width: 440px; background: var(--white); border-radius: 24px; box-shadow: var(--shadow); padding: 48px 36px 40px; }
    .logo-section { text-align: center; margin-bottom: 36px; }
    .logo-icon { width: 72px; height: 72px; background: linear-gradient(145deg, #f7f0e8, #ede0d0); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 16px; }
    .logo-icon i { font-size: 32px; color: var(--brown); }
    .site-name { font-size: 26px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
    .site-subtitle { font-size: 13px; color: #a08b73; }
    .separator { width: 48px; height: 2px; background: var(--gold); margin: 10px auto 0; border-radius: 1px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #b8a48e; font-size: 16px; }
    .input-wrapper input { width: 100%; padding: 14px 44px 14px 16px; border: 1.5px solid #e5ddd3; border-radius: 12px; font-size: 14px; color: var(--dark); background: #fdfaf6; transition: all 0.3s ease; outline: none; font-family: inherit; }
    .input-wrapper input:focus { border-color: var(--gold); background: var(--white); box-shadow: 0 0 0 4px rgba(200,175,147,0.1); }
    .error-message { display: none; color: var(--red); font-size: 12px; margin-top: 8px; padding: 10px 14px; background: #fdf0ee; border-radius: 8px; border: 1px solid #f5d6d3; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-family: inherit; }
    .btn-primary { background: linear-gradient(145deg, var(--brown), #6d553b); color: var(--white); margin-top: 8px; }
    .btn-primary:disabled { background: #c4b6a6; cursor: not-allowed; }
    .btn-sm { width: auto; padding: 8px 16px; font-size: 12px; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px; }
    .btn-xs { width: auto; padding: 4px 8px; font-size: 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-outline { background: transparent; border: 1.5px solid var(--gold); color: var(--brown); }
    .footer-text { text-align: center; margin-top: 24px; font-size: 12px; color: #b8a48e; }

    .dashboard { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
    .dashboard.active { display: block; }

    .topbar { display: flex; justify-content: space-between; align-items: center; background: var(--white); border-radius: 16px; padding: 16px 24px; margin-bottom: 24px; box-shadow: var(--shadow); flex-wrap: wrap; gap: 12px; }
    .topbar .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .topbar .user-info i { font-size: 20px; color: #f39c12; }
    .topbar .user-info span { font-weight: 600; color: var(--dark); }
    .role-badge { background: linear-gradient(145deg, #f39c12, #e67e22); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }

    .section-panel { background: var(--white); border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow); }
    .section-panel h2 { font-size: 20px; color: var(--dark); margin-bottom: 16px; }
    .section-panel h2 i { color: #f39c12; margin-left: 8px; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 10px 6px; text-align: right; border-bottom: 1px solid #f0e8dc; }
    th { background: var(--milk); color: var(--dark); font-weight: 600; font-size: 11px; white-space: nowrap; }
    tr:hover { background: #fdfaf6; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 500; white-space: nowrap; }
    .badge-info { background: #eaf2f8; color: #2980b9; }
    .badge-success { background: #eafaf1; color: #27ae60; }

    @media (max-width: 768px) { .login-container { padding: 32px 20px; } table { font-size: 10px; } th, td { padding: 6px 3px; } }
  </style>
</head>
<body>

  <div class="login-wrapper" id="loginSection">
    <div class="login-container">
      <div class="logo-section">
        <div class="logo-icon"><i class="fa-solid fa-crown" style="color:#f39c12;"></i></div>
        <h1 class="site-name">رسانه هنری قمر</h1>
        <p class="site-subtitle">پنل سازنده</p>
        <div class="separator"></div>
      </div>
      <form id="loginForm">
        <div class="form-group"><label>نام کاربری</label><div class="input-wrapper"><i class="fa-solid fa-user"></i><input type="text" id="username" placeholder="نام کاربری" required></div></div>
        <div class="form-group"><label>رمز عبور</label><div class="input-wrapper"><i class="fa-solid fa-lock"></i><input type="password" id="password" placeholder="••••••••" required></div></div>
        <div class="error-message" id="loginError"></div>
        <button type="submit" class="btn btn-primary" id="loginBtn"><i class="fa-solid fa-right-to-bracket"></i> ورود به پنل سازنده</button>
      </form>
      <p class="footer-text"><i class="fa-solid fa-circle"></i> قمر، رسانه هنر و خلاقیت <i class="fa-solid fa-circle"></i></p>
    </div>
  </div>

  <div class="dashboard" id="dashboardSection">
    <div class="topbar">
      <div class="user-info">
        <i class="fa-solid fa-crown"></i><span id="displayName">---</span>
        <span class="role-badge" id="displayRole">---</span>
      </div>
      <button class="btn btn-sm btn-outline" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> خروج</button>
    </div>

    <div class="section-panel">
      <h2><i class="fa-solid fa-users-gear"></i> مدیریت مدیران سایت</h2>
      <div style="overflow-x:auto;"><table><thead><tr><th>نام کاربری</th><th>نام</th><th>نقش</th><th>عملیات</th></tr></thead><tbody id="adminsTable"></tbody></table></div>
    </div>
  </div>

    <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwBVFp23ysijQCOHlc_0z7LmRCAMfWrLO9AXaja93qpbYXg_8hWEbYk4ipXs8YeI1dLhw/exec';
    let currentUser = null;

    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('qm_user');
      if (saved) { try { currentUser = JSON.parse(saved); if (currentUser.role==='creator') showDashboard(); else window.location.href='admin.html'; } catch(e) { localStorage.removeItem('qm_user'); showLogin(); } }
      else { showLogin(); }
    });

    function showLogin() {
      document.getElementById('loginSection').style.display = 'flex';
      document.getElementById('dashboardSection').classList.remove('active');
      localStorage.removeItem('qm_user'); currentUser = null;
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim(), p = document.getElementById('password').value;
      const err = document.getElementById('loginError'), btn = document.getElementById('loginBtn');
      if (!u || !p) { err.textContent = 'لطفاً نام کاربری و رمز عبور را وارد کنید.'; err.style.display = 'block'; return; }
      err.style.display = 'none'; btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> در حال ورود...';
      try {
        const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'login', username: u, password: p }) });
        const d = await res.json();
        if (d.result==='success') {
          if (d.data.role !== 'creator') { err.textContent = 'این پنل مخصوص سازنده است.'; err.style.display = 'block'; btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> ورود به پنل سازنده'; return; }
          currentUser = d.data; localStorage.setItem('qm_user', JSON.stringify(currentUser)); showDashboard();
        } else { err.textContent = d.message || 'خطا در ورود'; err.style.display = 'block'; }
      } catch(e) { err.textContent = 'خطا'; err.style.display = 'block'; }
      finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> ورود به پنل سازنده'; }
    });

    function showDashboard() {
      if (!currentUser || currentUser.role !== 'creator') { showLogin(); return; }
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').classList.add('active');
      document.getElementById('displayName').textContent = currentUser.name;
      document.getElementById('displayRole').textContent = 'سازنده';
      loadAdmins();
    }

    function logout() { showLogin(); }

    function getRoleLabel(role) { const m = { creator:'سازنده', owner:'مالک', super_admin:'ادمین ویژه', admin:'ادمین' }; return m[role]||role; }

    async function loadAdmins() {
      try {
        const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'getUsers' }) });
        const d = await res.json();
        const tbody = document.getElementById('adminsTable');
        if (d.result==='success') {
          tbody.innerHTML = d.data.users.map(u => `<tr>
            <td><button class="btn btn-xs btn-outline" onclick="showContent('${u.username}')"><i class="fa-solid fa-user"></i></button></td>
            <td>${u.name}</td><td><span class="badge badge-info">${getRoleLabel(u.role)}</span></td>
            <td class="actions">${getActions(u)}</td></tr>`).join('');
        }
      } catch(e) {}
    }

    function getActions(user) {
      if (user.role === 'creator') return '<span class="badge badge-success">خودت هستی</span>';
      let a = '';
      if (user.role !== 'owner') a += `<button class="btn btn-xs btn-success" onclick="setOwner('${user.username}')"><i class="fa-solid fa-crown"></i> مالک</button>`;
      a += `<button class="btn btn-xs btn-danger" onclick="removeUser('${user.username}')"><i class="fa-solid fa-user-slash"></i> عزل</button>`;
      return a;
    }

    async function setOwner(username) {
      if (!confirm('این کاربر به عنوان مالک انتخاب شود؟ مالک قبلی به ادمین تنزل می‌یابد.')) return;
      await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'setOwner', username }) });
      loadAdmins();
    }

    async function removeUser(username) {
      if (!confirm('این کاربر حذف شود؟')) return;
      await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'removeUser', username }) });
      loadAdmins();
    }

    function showContent(text) {
      const ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;justify-content:center;align-items:center;padding:20px;';
      ov.innerHTML = `<div style="background:#fff;border-radius:16px;padding:24px;max-width:500px;width:100%;"><p>${text}</p><button onclick="this.closest('div').parentElement.remove()" style="margin-top:16px;padding:10px 24px;background:#8b6f4e;color:#fff;border:none;border-radius:8px;cursor:pointer;">بستن</button></div>`;
      ov.addEventListener('click', function(e) { if(e.target===ov) ov.remove(); });
      document.body.appendChild(ov);
    }
  </script>
</body>
</html>
