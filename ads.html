<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رسانه هنری قمر | رزرو تبلیغات</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #fdfbf7; --milk: #f5efe6; --gold: #c8af93;
      --brown: #8b6f4e; --dark: #3e2c1c; --text: #5c4a3a; --white: #fff;
      --red: #e74c3c; --green: #27ae60;
    }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #fdfbf7, #f5efe6);
      color: var(--text); min-height: 100vh;
    }
    .header {
      background: var(--white); padding: 14px 20px; display: flex;
      align-items: center; box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      justify-content: space-between;
    }
    .header-back { color: var(--brown); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-logo-small { display: flex; align-items: center; gap: 8px; }
    .header-logo-small img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .header-logo-small span { font-weight: 700; color: var(--dark); font-size: 16px; }
    .container { max-width: 650px; margin: 0 auto; padding: 24px 20px; }
    .card { background: var(--white); border-radius: 20px; padding: 28px 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 16px; }
    h2 { color: var(--dark); margin-bottom: 4px; }
    h2 i { color: var(--red); }
    .subtitle { color: #a08b73; font-size: 13px; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .form-group label i { color: var(--red); font-size: 11px; margin-left: 4px; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e5ddd3; border-radius: 10px; font-size: 13px; background: #fdfaf6; outline: none; font-family: inherit; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(231,76,60,0.1); }
    .error-message { display: none; color: var(--red); font-size: 12px; padding: 10px 14px; background: #fdf0ee; border-radius: 8px; text-align: center; margin-bottom: 12px; }
    .success-message { display: none; color: var(--green); font-size: 12px; padding: 10px 14px; background: #eafaf1; border-radius: 8px; text-align: center; margin-bottom: 12px; }

    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s; }
    .btn-red { background: linear-gradient(145deg, #e74c3c, #c0392b); color: #fff; }
    .btn-red:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-brown { background: linear-gradient(145deg, var(--brown), #6d553b); color: #fff; }
    .tab-btns { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .tab-btn.active { background: var(--red); color: #fff; }
    .tab-btn:not(.active) { background: var(--milk); color: var(--brown); }

    .preview-section { margin-top: 16px; }
    .preview-section h3 { font-size: 15px; color: var(--dark); margin-bottom: 12px; }
    .preview-card {
      background: var(--white); border-radius: 12px; overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.04); border: 2px dashed #e74c3c;
      max-width: 280px; margin: 0 auto;
    }
    .preview-card img { width: 100%; height: 160px; object-fit: cover; }
    .preview-card .info { padding: 10px 12px; }
    .preview-card .info .p-name { font-size: 12px; font-weight: 700; color: var(--dark); }
    .preview-card .info .p-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
    .preview-card .info .p-cat { font-size: 9px; background: #e74c3c; color: #fff; padding: 2px 8px; border-radius: 10px; }
    .preview-card .info .p-desc { font-size: 10px; color: #e74c3c; }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 500; white-space: nowrap; }
    .my-ad-item { background:#fdfaf6; border-radius:10px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }

    @media (max-width: 500px) { .container { padding: 12px 8px; } .card { padding: 20px 16px; } }
  </style>
</head>
<body>
  <header class="header">
    <a href="menu.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-logo-small">
      <img src="https://cdn.imgurl.ir/uploads/n606537_IMG_20260618_122029_787.jpg" alt="لوگو">
      <span>رسانه هنری قمر</span>
    </div>
    <div style="width:60px;"></div>
  </header>

  <div class="container">

    <!-- AUTH -->
    <div class="card" id="authSection">
      <div class="tab-btns">
        <button class="tab-btn active" onclick="switchAuthTab('login')">ورود</button>
        <button class="tab-btn" onclick="switchAuthTab('register')">ثبت‌نام</button>
      </div>
      <div id="loginForm">
        <form onsubmit="handleLogin(event)">
          <div class="form-group"><label>نام کاربری</label><input type="text" id="loginUsername" required></div>
          <div class="form-group"><label>رمز عبور</label><input type="password" id="loginPassword" required></div>
          <div class="error-message" id="loginError"></div>
          <button type="submit" class="btn btn-red"><i class="fa-solid fa-right-to-bracket"></i> ورود</button>
        </form>
      </div>
      <div id="registerForm" style="display:none;">
        <form onsubmit="handleRegister(event)">
          <div class="form-group"><label>نام و نام خانوادگی</label><input type="text" id="regName" required></div>
          <div class="form-group"><label>راه ارتباطی (ایتا)</label><input type="text" id="regContact" required></div>
          <div class="form-group"><label>نام کاربری</label><input type="text" id="regUsername" required></div>
          <div class="form-group"><label>رمز عبور</label><input type="password" id="regPassword" required minlength="4"></div>
          <div class="error-message" id="regError"></div>
          <div class="success-message" id="regSuccess"></div>
          <button type="submit" class="btn btn-brown"><i class="fa-solid fa-user-plus"></i> ثبت‌نام</button>
        </form>
      </div>
    </div>

    <!-- REQUEST FORM -->
    <div class="card" id="requestCard" style="display:none;">
      <h2><i class="fa-solid fa-ad"></i> رزرو تبلیغات</h2>
      <p class="subtitle">اطلاعات تبلیغ خود را وارد کنید</p>

      <form id="adForm">
        <div class="form-group"><label><i class="fa-solid fa-heading"></i> تیتر تبلیغ</label><input type="text" id="adTitle" placeholder="عنوان تبلیغ" required oninput="updatePreview()"></div>
        <div class="form-group"><label><i class="fa-solid fa-align-left"></i> توضیح کوتاه</label><input type="text" id="adDesc" placeholder="متن کوتاه تبلیغ" required oninput="updatePreview()"></div>
        <div class="form-group"><label><i class="fa-solid fa-image"></i> لینک تصویر</label><input type="url" id="adImage" placeholder="https://..." required oninput="updatePreview()"></div>
        <div class="form-group"><label><i class="fa-solid fa-link"></i> لینک مقصد</label><input type="url" id="adLink" placeholder="https://..." required></div>

        <div class="error-message" id="adError"></div>
        <div class="success-message" id="adSuccess"></div>

        <button type="submit" class="btn btn-red" id="adBtn"><i class="fa-solid fa-paper-plane"></i> ارسال درخواست تبلیغ</button>
      </form>

      <div class="preview-section" id="previewSection">
        <h3><i class="fa-solid fa-eye"></i> پیش‌نمایش</h3>
        <div class="preview-card">
          <img src="https://cdn.imgurl.ir/uploads/n606537_IMG_20260618_122029_787.jpg" alt="پیش‌نمایش" id="previewImg">
          <div class="info">
            <div class="p-name" id="previewTitle">تیتر تبلیغ</div>
            <div class="p-meta"><span class="p-cat">تبلیغ</span><span class="p-desc" id="previewDesc">توضیح کوتاه</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- MY ADS -->
    <div class="card" id="myAdsCard" style="display:none;">
      <h2><i class="fa-solid fa-list-check"></i> درخواست‌های من</h2>
      <div id="myAdsList"></div>
    </div>

    <!-- SUCCESS -->
    <div class="card" id="successCard" style="display:none;text-align:center;">
      <i class="fa-solid fa-check-circle" style="font-size:56px;color:var(--green);margin-bottom:12px;"></i>
      <h2>درخواست ثبت شد!</h2>
      <p style="color:#a08b73;margin:12px 0;">پس از تأیید و تعیین قیمت توسط ادمین، به همین صفحه مراجعه کنید</p>
      <div id="adPaySection" style="display:none;margin-top:16px;">
        <p style="color:var(--green);font-weight:700;">قیمت تعیین شده: <span id="adPriceText"></span> تومان</p>
        <button class="btn btn-red" onclick="payAd()" style="margin-top:8px;"><i class="fa-solid fa-credit-card"></i> پرداخت و فعال‌سازی تبلیغ</button>
      </div>
      <a href="menu.html" class="btn btn-brown" style="margin-top:8px;"><i class="fa-solid fa-arrow-right"></i> بازگشت به منو</a>
    </div>

  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxvhwBmK0KwLGm1yNPisuRbcWRSlN-vuIwteQjWb9SS0MNOBY10GPHf0J8qQ_Nw0l9bSw/exec';
    let currentCustomer = null;

    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('qm_customer');
      if (saved) { try { currentCustomer = JSON.parse(saved); showAdForm(); } catch(e) {} }
    });

    function switchAuthTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
      document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
      if (tab==='login') document.querySelector('.tab-btn:first-child').classList.add('active');
      else document.querySelector('.tab-btn:last-child').classList.add('active');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const u = document.getElementById('loginUsername').value.trim(), p = document.getElementById('loginPassword').value;
      const err = document.getElementById('loginError');
      err.style.display = 'none';
      const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'customerLogin', username:u, password:p }) });
      const d = await res.json();
      if (d.result==='success') { currentCustomer = d.data; localStorage.setItem('qm_customer', JSON.stringify(currentCustomer)); showAdForm(); }
      else { err.textContent = d.message; err.style.display = 'block'; }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const err = document.getElementById('regError'), ok = document.getElementById('regSuccess');
      err.style.display = 'none'; ok.style.display = 'none';
      const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'customerRegister', username: document.getElementById('regUsername').value.trim(), password: document.getElementById('regPassword').value, name: document.getElementById('regName').value.trim(), contact: document.getElementById('regContact').value.trim() }) });
      const d = await res.json();
      if (d.result==='success') { ok.textContent = 'ثبت‌نام انجام شد! حالا وارد شوید.'; ok.style.display = 'block'; setTimeout(() => switchAuthTab('login'), 1500); }
      else { err.textContent = d.message; err.style.display = 'block'; }
    }

    function showAdForm() {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('requestCard').style.display = 'block';
      document.getElementById('myAdsCard').style.display = 'block';
      checkAdStatus();
      loadMyAds();
    }

    function updatePreview() {
      document.getElementById('previewTitle').textContent = document.getElementById('adTitle').value || 'تیتر تبلیغ';
      document.getElementById('previewDesc').textContent = document.getElementById('adDesc').value || 'توضیح کوتاه';
      const img = document.getElementById('adImage').value;
      if (img) document.getElementById('previewImg').src = img;
    }

    document.getElementById('adForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('adBtn'), err = document.getElementById('adError'), ok = document.getElementById('adSuccess');
      err.style.display = 'none'; ok.style.display = 'none';
      btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> در حال ارسال...';
      try {
        const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({
          action:'addAd', customer_name: currentCustomer.name, contact: currentCustomer.contact,
          title: document.getElementById('adTitle').value, description: document.getElementById('adDesc').value,
          image_url: document.getElementById('adImage').value, link_url: document.getElementById('adLink').value
        })});
        const d = await res.json();
        if (d.result==='success') {
          document.getElementById('requestCard').style.display = 'none';
          document.getElementById('successCard').style.display = 'block';
          localStorage.setItem('qm_ad_id', d.data.ad_id);
          loadMyAds();
        } else { err.textContent = d.message || 'خطا'; err.style.display = 'block'; }
      } catch(e) { err.textContent = 'خطا'; err.style.display = 'block'; }
      finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> ارسال'; }
    });

    async function checkAdStatus() {
      const adId = localStorage.getItem('qm_ad_id');
      if (!adId) return;
      try {
        const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'getAds' }) });
        const d = await res.json();
        if (d.result==='success') {
          const ad = d.data.ads.find(a => a.ad_id === adId);
          if (ad && ad.price && ad.status !== 'approved') {
            document.getElementById('adPaySection').style.display = 'block';
            document.getElementById('adPriceText').textContent = Number(ad.price).toLocaleString('fa-IR');
          }
        }
      } catch(e) {}
    }

    async function loadMyAds() {
      if (!currentCustomer) return;
      try {
        const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'getAds' }) });
        const d = await res.json();
        if (d.result === 'success') {
          const myAds = d.data.ads.filter(a => a.customer_name && a.customer_name.includes(currentCustomer.name));
          const container = document.getElementById('myAdsList');
          if (myAds.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#a08b73;">هیچ درخواستی ندارید</p>';
            return;
          }
          container.innerHTML = myAds.map(a => `
            <div class="my-ad-item">
              <div>
                <strong>${a.title}</strong>
                <p style="font-size:11px;color:#a08b73;">${a.description||''}</p>
                ${a.price ? `<span style="color:var(--green);font-size:12px;">${Number(a.price).toLocaleString('fa-IR')} تومان</span>` : '<span style="color:#f39c12;font-size:12px;">منتظر قیمت</span>'}
              </div>
              <span class="badge" style="background:${a.status==='approved'?'#eafaf1':a.status==='rejected'?'#fdf0ee':'#fef9e7'};color:${a.status==='approved'?'#27ae60':a.status==='rejected'?'#c0392b':'#f39c12'};">${a.status==='approved'?'تایید شده':a.status==='rejected'?'رد شده':'در انتظار'}</span>
            </div>`).join('');
        }
      } catch(e) {}
    }

    function payAd() {
      const adId = localStorage.getItem('qm_ad_id');
      const price = parseInt(document.getElementById('adPriceText').textContent.replace(/,/g, ''));
      localStorage.setItem('qm_pay_ad_id', adId);
      localStorage.setItem('qm_pay_ad_price', price);
      window.location.href = 'pay.html';
    }

    updatePreview();
  </script>
</body>
</html>
