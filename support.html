<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رسانه هنری قمر | پشتیبانی</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #fdfbf7; --milk: #f5efe6; --gold: #c8af93;
      --brown: #8b6f4e; --dark: #3e2c1c; --text: #5c4a3a; --white: #fff;
      --blue: #2196F3; --green: #27ae60;
    }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #fdfbf7, #f5efe6);
      color: var(--text); min-height: 100vh;
    }
    .header {
      background: var(--white); padding: 14px 20px; display: flex;
      align-items: center; box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      justify-content: space-between;
    }
    .header-back { color: var(--brown); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-back:hover { color: var(--dark); }
    .header-logo-small { display: flex; align-items: center; gap: 8px; }
    .header-logo-small img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .header-logo-small span { font-weight: 700; color: var(--dark); font-size: 16px; }
    
    .chat-container {
      max-width: 650px; margin: 0 auto; padding: 16px;
      display: flex; flex-direction: column; height: calc(100vh - 70px);
    }
    
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    
    .msg { margin-bottom: 12px; display: flex; gap: 8px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .msg.user { flex-direction: row-reverse; }
    
    .msg .avatar {
      width: 36px; height: 36px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .msg.bot .avatar { background: #e3f2fd; color: var(--blue); }
    .msg.user .avatar { background: #e8f5e9; color: var(--green); }
    
    .msg .bubble {
      max-width: 80%; padding: 12px 16px; border-radius: 16px;
      font-size: 13px; line-height: 1.6;
    }
    .msg.bot .bubble { background: var(--white); box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-bottom-right-radius: 4px; }
    .msg.user .bubble { background: #e3f2fd; border-bottom-left-radius: 4px; }
    
    .chat-input-area {
      display: flex; gap: 8px; padding: 12px 0;
      background: linear-gradient(to top, #fdfbf7, transparent); position: sticky; bottom: 0;
    }
    .chat-input-area input {
      flex: 1; padding: 12px 16px; border: 1.5px solid #e5ddd3;
      border-radius: 24px; font-size: 13px; background: var(--white);
      outline: none; font-family: inherit;
    }
    .chat-input-area input:focus { border-color: var(--blue); }
    .chat-input-area button {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: var(--blue); color: #fff; font-size: 18px; cursor: pointer;
      transition: all 0.3s ease; flex-shrink: 0;
    }
    .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .typing-indicator {
      display: none; padding: 8px 16px; color: #a08b73; font-size: 12px;
    }
    .typing-indicator i { margin: 0 2px; animation: bounce 0.6s infinite; }
    .typing-indicator i:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator i:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    @media (max-width: 500px) { .chat-container { padding: 8px; } .msg .bubble { max-width: 85%; } }
  </style>
</head>
<body>
  <header class="header">
    <a href="menu.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-logo-small">
      <img src="https://cdn.imgurl.ir/uploads/n606537_IMG_20260618_122029_787.jpg" alt="لوگو">
      <span>رسانه هنری قمر</span>
    </div>
    <div style="width:60px;"></div>
  </header>

  <div class="chat-container">
    <div class="chat-messages" id="chatMessages">
      <div class="msg bot">
        <div class="avatar"><i class="fa-solid fa-robot"></i></div>
        <div class="bubble">
          سلام! 👋<br>من ربات پشتیبانی رسانه هنری قمر هستم.<br>چطور می‌تونم کمکت کنم؟
        </div>
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <i class="fa-solid fa-circle" style="font-size:6px;"></i>
      <i class="fa-solid fa-circle" style="font-size:6px;"></i>
      <i class="fa-solid fa-circle" style="font-size:6px;"></i>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="سوال خود را بنویسید..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz2Llh70dOnj6Uo6r6WWza7vbQI7_2FAWnuOVNb7mh3WpkaezHIfyo6H__33ONiY-Qv0w/exec';

    function addMessage(text, isUser) {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg ' + (isUser ? 'user' : 'bot');
      div.innerHTML = `
        <div class="avatar"><i class="fa-solid ${isUser ? 'fa-user' : 'fa-robot'}"></i></div>
        <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showTyping(show) {
      document.getElementById('typingIndicator').style.display = show ? 'block' : 'none';
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const btn = document.getElementById('sendBtn');
      const message = input.value.trim();
      if (!message) return;

      // Add user message
      addMessage(message, true);
      input.value = '';
      btn.disabled = true;
      showTyping(true);

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'chatSupport', message: message })
        });
        const data = await res.json();

        showTyping(false);
        if (data.result === 'success') {
          addMessage(data.data.reply, false);
        } else {
          addMessage('⚠️ خطا در ارتباط با پشتیبانی. لطفاً دوباره تلاش کنید.', false);
        }
      } catch(e) {
        showTyping(false);
        addMessage('⚠️ خطا در ارتباط با سرور.', false);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
